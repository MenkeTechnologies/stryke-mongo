[package]
name = "stryke-mongo"
version = "0.21.0"
description = "MongoDB client for stryke. Find / insert / update / delete / aggregate / index admin against mongo 5.0+. cdylib loaded in-process — persistent mongodb::Client cache across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-mongo"
edition = "2026"

[ffi]
lib-name = "stryke_mongo"
namespace = "Mongo"
exports = [
    "mongo__pkg_version",
    "mongo__ping",
    "mongo__list_databases",
    "mongo__list_collections",
    "mongo__find",
    "mongo__find_one",
    "mongo__count",
    "mongo__aggregate",
    "mongo__insert_one",
    "mongo__insert_many",
    "mongo__update_one",
    "mongo__update_many",
    "mongo__replace_one",
    "mongo__delete_one",
    "mongo__delete_many",
    "mongo__create_index",
    "mongo__create_indexes",
    "mongo__drop_index",
    "mongo__indexes",
    "mongo__collection_specs",
    "mongo__validate",
    "mongo__find_one_and_update",
    "mongo__find_one_and_replace",
    "mongo__find_one_and_delete",
    "mongo__distinct",
    "mongo__estimated_count",
    "mongo__create_collection",
    "mongo__drop_collection",
    "mongo__run_command",
    "mongo__drop_database",
    "mongo__drop_indexes",
    "mongo__aggregate_db",
    "mongo__rename_collection",
    "mongo__coll_stats",
    "mongo__db_stats",
    "mongo__explain",
    "mongo__server_status",
    "mongo__parse_connection_string",
    "mongo__build_connection_string",
    "mongo__valid_connection_string",
    "mongo__redact_connection_string",
    "mongo__parse_namespace",
    "mongo__build_namespace",
    "mongo__valid_collection_name",
    "mongo__valid_database_name",
    "mongo__valid_namespace",
    "mongo__valid_field_name",
    "mongo__escape_regex",
    "mongo__unescape_regex",
    "mongo__is_valid_objectid",
    "mongo__new_objectid",
    "mongo__objectid_timestamp",
    "mongo__parse_objectid",
    "mongo__objectid_compare",
    "mongo__build_objectid",
    "mongo__objectid_from_time",
    "mongo__objectid_max_from_time",
    "mongo__objectid_range",
    "mongo__merge_filters",
    "mongo__build_update",
    "mongo__build_sort",
    "mongo__build_projection",
    "mongo__normalize_index_keys",
    "mongo__in_filter",
    "mongo__between_filter",
    "mongo__build_regex_filter",
    "mongo__or_filter",
    "mongo__exists_filter",
    "mongo__elem_match_filter",
    "mongo__text_filter",
    "mongo__not_filter",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
