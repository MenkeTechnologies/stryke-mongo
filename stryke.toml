[package]
name = "stryke-mongo"
version = "0.9.0"
description = "MongoDB client for stryke. Find / insert / update / delete / aggregate / index admin against mongo 5.0+. cdylib loaded in-process — persistent mongodb::Client cache across calls."
authors = ["MenkeTechnologies"]
license = "MIT"
repository = "https://github.com/MenkeTechnologies/stryke-mongo"
edition = "2026"

[ffi]
lib-name = "stryke_mongo"
namespace = "Mongo"
exports = [
    "mongo__pkg_version",
    "mongo__ping",
    "mongo__list_databases",
    "mongo__list_collections",
    "mongo__find",
    "mongo__find_one",
    "mongo__count",
    "mongo__aggregate",
    "mongo__insert_one",
    "mongo__insert_many",
    "mongo__update_one",
    "mongo__update_many",
    "mongo__replace_one",
    "mongo__delete_one",
    "mongo__delete_many",
    "mongo__create_index",
    "mongo__create_indexes",
    "mongo__drop_index",
    "mongo__indexes",
    "mongo__find_one_and_update",
    "mongo__find_one_and_replace",
    "mongo__find_one_and_delete",
    "mongo__distinct",
    "mongo__estimated_count",
    "mongo__create_collection",
    "mongo__drop_collection",
    "mongo__run_command",
    "mongo__rename_collection",
    "mongo__coll_stats",
    "mongo__db_stats",
    "mongo__explain",
    "mongo__server_status",
    "mongo__parse_connection_string",
    "mongo__parse_namespace",
    "mongo__build_namespace",
    "mongo__valid_collection_name",
    "mongo__valid_database_name",
    "mongo__is_valid_objectid",
    "mongo__new_objectid",
    "mongo__objectid_timestamp",
    "mongo__objectid_from_time",
]

[scripts]
build = "cargo build --release"
build-debug = "cargo build"
clean = "cargo clean"
test = "s test t/"
install = "s pkg install -g ."
